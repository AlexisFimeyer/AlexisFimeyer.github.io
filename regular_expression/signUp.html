<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <h1>Sign Up</h1>
    <div class="container">
      <form class="all-form" action="overview.html" method="post">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required="required" pattern="(^[A-Z])(?:.{4,10})([0-9]|\W)$">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required pattern="^[a-zA-Z]+$">
        <label for="address">Address:</label>
        <input type="text" id="address" name="address">
        <label for="country">Country:</label>
        <input type="text" id="country" name="country" required>
        <label for="ZIP code">ZIP code:</label>
        <input type="text" id="ZIP code" name="ZIP code" required pattern="^\d{4,4}[A-Z]{2,2}$">
        <label for="gender">Select sex:</label>
        <select name="gender" required>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
        <label for="Language">Language:</label>
        <input type="text" id="Language" name="Language" required>
        <label for="About">About:</label>
        <input type="text" id="About" name="About">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required pattern="^[A-Za-z0-9.]+@[A-Za-z0-9]+\.[A-Za-z0-9.]+$">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*\W).{12,}$" >
        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm-password" required pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*\W).{12,}$">
        <button type="submit">Sign up</button>
      </form> 
    </div>
    <div class="signup-link">
      Already have an account? <a href="index.html">Login
    </div>
  </body>
</html>
