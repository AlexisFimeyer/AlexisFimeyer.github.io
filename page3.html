<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1 style="color: #3c43c9;">Set a S.M.A.R.T. Goal</h1>
      <form class="goal-form" action="setTarget.html">
        <label for="name"; style="color: #3c43c9;">Name:</label><br>
        <input type="text" id="name" name="name" required><br>
        <label for="goal"; style="color: #3c43c9;">Specific:</label><br>
        <textarea id="Specific" name="Specific" rows="4" required></textarea><br>
        <label for="measurable"; style="color: #3c43c9;">Measurable:</label><br>
        <input type="text" id="measurable" name="measurable" required><br>
        <label for="attainable"; style="color: #3c43c9;">Attainable:</label><br>
        <input type="text" id="attainable" name="attainable" required><br>
        <label for="realistic"; style="color: #3c43c9;">Realistic:</label><br>
        <input type="text" id="realistic" name="realistic" required><br>
        <label for="Timely"; style="color: #3c43c9;">Timely:</label><br>
        <input type="date" id="Timely" name="Timely" required><br>
        <button type="submit"><b style="font-size: 17;">Set targets</b></button>
      </form>
    </div>
  </body>
</html>
