<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <h1>Set a S.M.A.R.T. Goal</h1>
    <div class="container">
      <form class="goal-form all-form" action="setTarget.html">
        <label for="name";>Name:</label>
        <input type="text" id="name" name="name" required>
        <label for="goal";>Specific:</label>
        <textarea id="Specific" name="Specific" rows="4" required></textarea>
        <label for="measurable";>Measurable:</label>
        <input type="text" id="measurable" name="measurable" required>
        <label for="attainable";>Attainable:</label>
        <input type="text" id="attainable" name="attainable" required>
        <label for="realistic";>Realistic:</label>
        <input type="text" id="realistic" name="realistic" required>
        <label for="Timely";>Timely:</label>
        <input type="date" id="Timely" name="Timely" required>
        <button type="submit">Set targets</button>
      </form>
    </div>
  </body>
</html>
